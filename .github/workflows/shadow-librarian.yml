name: Shadow Librarian Swarm

on:
  schedule:
    - cron: '0 0,8,16 * * *' # 3 times a day
  workflow_dispatch: # Allow manual trigger

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          ref: refs/heads/master
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Debug checked-out revision
        run: |
          echo "Checked out SHA: $(git rev-parse --short HEAD)"
          git show -s --format='%H %s'
          sed -n '1,35p' src/lib/supabase.ts

      - name: Assert latest master checkout
        run: |
          local_sha="$(git rev-parse HEAD)"
          remote_sha="$(git ls-remote origin refs/heads/master | cut -f1)"
          echo "Local SHA:  ${local_sha}"
          echo "Remote SHA: ${remote_sha}"
          test "${local_sha}" = "${remote_sha}" || (echo "Workflow is not on latest master. Run workflow_dispatch from master instead of rerun." && exit 1)

      - name: Install Dependencies
        run: npm ci

      - name: Validate Required Secrets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          test -n "$GEMINI_API_KEY" || (echo "Missing GEMINI_API_KEY" && exit 1)
          test -n "$SUPABASE_URL" || (echo "Missing SUPABASE_URL" && exit 1)
          test -n "$SUPABASE_SERVICE_ROLE_KEY" || (echo "Missing SUPABASE_SERVICE_ROLE_KEY" && exit 1)

      - name: Run Master Librarian
        run: npx tsx src/scripts/researcher.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
