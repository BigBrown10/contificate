name: JINTA Shadow Swarm (24/7 Autopilot)

on:
  schedule:
    - cron: '0 * * * *' # Run every hour on the dot
  workflow_dispatch:     # Allow manual triggers from GitHub UI

jobs:
  run-swarm:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: refs/heads/master

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Debug checked-out revision
        run: |
          echo "Checked out SHA: $(git rev-parse --short HEAD)"
          git show -s --format='%H %s'
          sed -n '1,35p' src/lib/supabase.ts

      - name: Assert latest master checkout
        run: |
          local_sha="$(git rev-parse HEAD)"
          remote_sha="$(git ls-remote origin refs/heads/master | cut -f1)"
          echo "Local SHA:  ${local_sha}"
          echo "Remote SHA: ${remote_sha}"
          test "${local_sha}" = "${remote_sha}" || (echo "Workflow is not on latest master. Run workflow_dispatch from master instead of rerun." && exit 1)

      - name: Validate Required Secrets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          FREESOUND_API_KEY: ${{ secrets.FREESOUND_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          test -n "$GEMINI_API_KEY" || (echo "Missing GEMINI_API_KEY" && exit 1)
          test -n "$PEXELS_API_KEY" || (echo "Missing PEXELS_API_KEY" && exit 1)
          test -n "$FREESOUND_API_KEY" || (echo "Missing FREESOUND_API_KEY" && exit 1)
          test -n "$TELEGRAM_BOT_TOKEN" || (echo "Missing TELEGRAM_BOT_TOKEN" && exit 1)
          test -n "$TELEGRAM_CHAT_ID" || (echo "Missing TELEGRAM_CHAT_ID" && exit 1)
          test -n "$SUPABASE_URL" || (echo "Missing SUPABASE_URL" && exit 1)
          test -n "$SUPABASE_SERVICE_ROLE_KEY" || (echo "Missing SUPABASE_SERVICE_ROLE_KEY" && exit 1)

      - name: Run Librarian Agent (Research)
        run: npx tsx src/scripts/researcher.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Run Shadow Worker (Content Generation)
        run: npx tsx src/scripts/shadow-worker.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          FREESOUND_API_KEY: ${{ secrets.FREESOUND_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Cleanup
        run: rm -rf _approved_vault # Ensure environment stays clean
